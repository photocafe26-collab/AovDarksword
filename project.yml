name: AovDarksword
options:
  bundleIdPrefix: com.aov.ds
  deploymentTarget:
    iOS: "17.0"
targets:
  AovDarksword:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Source/Info.plist
    sources:
      - path: Source
        excludes:
          - "Info.plist"
          - "AovDarksword.entitlements"
          - "Makefile"
    frameworks:
      - framework: Foundation.framework
      - framework: UIKit.framework
      - framework: QuartzCore.framework
      - framework: CoreGraphics.framework
      - framework: IOSurface.framework
      - framework: Photos.framework
      - framework: PhotosUI.framework
      - framework: Security.framework
      - framework: MobileCoreServices.framework
      - framework: UniformTypeIdentifiers.framework
      - framework: AVFAudio.framework
      - framework: AVKit.framework
      - framework: CoreFoundation.framework
      - framework: SafariServices.framework
      - framework: WebKit.framework
      - sdk: libc++.tbd
      - sdk: libz.tbd
    settings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      CLANG_ENABLE_OBJC_ARC: YES
      ARCHS: arm64
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      OTHER_CFLAGS:
        - "-Wno-unused-variable"
        - "-Wno-unused-function"
        - "-Wno-deprecated-declarations"
        - "-DVERSION=\\\"1.4\\\""
      OTHER_LDFLAGS:
        - "-Wl,-undefined,dynamic_lookup"
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Source
        - $(SRCROOT)/Source/Core
        - $(SRCROOT)/Source/Game
        - $(SRCROOT)/Source/HUD
        - $(SRCROOT)/Source/Mod
        - $(SRCROOT)/Source/Tweaks
        - $(SRCROOT)/Source/Utils
