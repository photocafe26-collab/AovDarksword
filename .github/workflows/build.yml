name: Build IPA
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install XcodeGen
        run: brew install xcodegen
      
      - name: Generate Xcode Project
        run: xcodegen generate
      
      - name: Build App
        run: |
          xcodebuild clean build -project AovDarksword.xcodeproj -scheme AovDarksword -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/AovDarksword.app Payload/
          zip -r AovDarksword.ipa Payload
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AovDarksword-IPA
          path: AovDarksword.ipa
